title = "Gitleaks configuration for whack-a-mole"

[allowlist]
  description = "Paths excluded from secret scanning to reduce false positives from auto-generated and configuration files"
  paths = [
    # Auto-generated by npm; contains integrity hashes and URLs that trigger
    # false positive secret detections. Not authored by developers and should
    # not contain real secrets.
    '''package-lock\.json$''',
    # This is the gitleaks configuration file itself; it may contain example
    # patterns or rule definitions that look like secrets but are not.
    '''\.gitleaks\.toml$''',
  ]
